<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockyShop - ROCKYROADS</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* --- DE NIEUWE ABSTRACTE, WARME GOLF ACHTERGROND --- */
        body {
            /* Basis: Diep, warm bruin */
            background-color: #3e2516;
            
            /* Een spel van abstracte, vloeiende golven in warme tinten */
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 152, 0, 0.15) 0px, transparent 40%), /* Karamel Golf */
                radial-gradient(at 80% 90%, rgba(247, 233, 215, 0.1) 0px, transparent 40%), /* Crème Golf */
                radial-gradient(at 50% 50%, rgba(78, 49, 31, 0.5) 0px, transparent 60%), /* Melkbruin Accent */
                linear-gradient(135deg, #3e2516 0%, #2b1406 100%); /* Basis verloop */
            
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        /* De Druipende Afbeelding bovenaan */
        .dripping-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background-image: url('image_0.png');
            background-size: contain;
            background-repeat: repeat-x;
            z-index: 101;
            mix-blend-mode: screen; 
            opacity: 0.8;
        }

        /* Vallende druppels (aangepast voor deze achtergrond) */
        .drop {
            position: fixed;
            top: 60px;
            width: 15px;
            height: 15px;
            background-color: #2b1406;
            border-radius: 50%;
            z-index: 99;
            animation: fall infinite linear;
            box-shadow: 0 0 5px rgba(255,152,0,0.2);
        }

        @keyframes fall {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(100vh) scale(0.5); opacity: 0; }
        }

        /* Hoofdinhoud */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
            padding-top: 150px;
            padding-bottom: 120px;
        }

        h1 {
            font-size: clamp(45px, 12vw, 90px);
            margin: 0;
            color: #ff9800; /* Goud/Karamel */
            -webkit-text-stroke: 1px #2b1406;
            letter-spacing: -1px;
        }

        .start-button {
            background: #ff9800;
            border: 4px solid #2b1406;
            padding: 18px 50px;
            font-size: 26px;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.2s;
            font-weight: bold;
            box-shadow: 0 8px 0 #2b1406;
            text-transform: uppercase;
        }

        .start-button:hover {
            transform: scale(1.05) translateY(-3px);
            background: #ffa726;
            box-shadow: 0 10px 0 #2b1406;
        }

        .footer {
            background-color: rgba(43, 20, 6, 0.9);
            color: #f7e9d7;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            z-index: 100;
            border-top: 5px solid #ff9800;
        }

        .footer h3 { margin: 0 0 10px 0; color: #ff9800; text-transform: uppercase; }
        .address-box { font-size: 18px; font-style: normal; }
    </style>
</head>
<body>

    <div class="dripping-header"></div>

    <div class="drop" style="left: 20%; animation-duration: 6s;"></div>
    <div class="drop" style="left: 45%; animation-duration: 8s; animation-delay: 2s;"></div>
    <div class="drop" style="left: 75%; animation-duration: 5s; animation-delay: 1s;"></div>
    <div class="drop" style="left: 95%; animation-duration: 7s; animation-delay: 3s;"></div>

    <div class="content">
        <h1>ROCKYSHOP</h1>
        <p style="font-size: 22px; font-family: sans-serif; font-weight: bold; margin-top: 10px;">De droom van elke zoetekauw</p>
        <a href="samenstellen.html">
            <button class="start-button">ONTWERP JE REEP</button>
        </a>
    </div>
</body>
</html>
