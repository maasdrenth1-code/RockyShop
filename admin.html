<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>RockyShop - Admin</title>
    <style>
        body { 
            margin: 0; padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #3e2516; min-height: 100vh;
            background-color: #5d3a24;
            background-image: 
                radial-gradient(at 10% 10%, rgba(43, 20, 6, 0.9) 0px, transparent 50%),
                radial-gradient(at 90% 85%, rgba(78, 49, 31, 0.8) 0px, transparent 50%),
                linear-gradient(180deg, #5d3a24 0%, #4e311f 100%);
            background-attachment: fixed;
        }

        .dripping-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background-image: url('image_5190f8.png'); 
            background-size: contain; background-repeat: repeat-x; z-index: 1000; 
            mix-blend-mode: multiply; pointer-events: none; opacity: 0.9;
        }

        .admin-wrapper { max-width: 900px; margin: 80px auto 0 auto; position: relative; z-index: 10; }

        .login-box { 
            max-width: 350px; margin: 100px auto; text-align: center; 
            background: rgba(255, 255, 255, 0.95); padding: 30px; 
            border-radius: 20px; border: 4px solid #ff9800; box-shadow: 0 15px 30px rgba(0,0,0,0.3); 
        }

        .order-card { 
            background: white; border: 2px solid #3e2516; padding: 20px; 
            margin-bottom: 15px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
            position: relative;
        }

        .status { font-weight: bold; padding: 6px 10px; border-radius: 6px; font-size: 11px; float: right; text-transform: uppercase; margin-left: 10px; }
        .Wacht { background: #fff3e0; color: #ef6c00; border: 1px solid #ef6c00; }
        .Betaalgegevens { background: #e3f2fd; color: #1976d2; border: 1px solid #1976d2; }
        .BETAALD { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .In-behandeling { background: #f3e5f5; color: #7b1fa2; border: 1px solid #7b1fa2; }
        .Klaar { background: #4caf50; color: white; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 8px; margin-top: 10px; transition: 0.2s; position: relative; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-blue { background: #2196F3; color: white; }
        .btn-green { background: #4caf50; color: white; }
        .btn-red { background: #f44336; color: white; }
        .btn-info { background: #795548; color: white; }
        .btn-purple { background: #673ab7; color: white; box-shadow: 0 4px 0 #4527a0; }
        .btn-dark { background: #3e2516; color: white; }

        .warning-badge {
            display: inline-block; background: #ff5722; color: white; font-size: 11px;
            padding: 2px 7px; border-radius: 50%; border: 2px solid white;
            animation: pulse 1s infinite; margin-left: 5px; font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .popup { background: white; padding: 25px; border-radius: 15px; text-align: center; max-width: 500px; width: 95%; color: #3e2516; border: 5px solid #ff9800; }
        
        .stock-row { display: grid; grid-template-columns: 3fr 1fr; gap: 15px; align-items: center; border-bottom: 1px solid #eee; padding: 12px 0; text-align: left; }
        .header-row { font-size: 11px; font-weight: bold; color: #777; border-bottom: 2px solid #ddd; }
        
        .ah-link { display: block; background: #00adef; color: white; padding: 12px; margin: 8px 0; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: left; }
        .ah-link span { float: right; background: rgba(0,0,0,0.2); padding: 0 8px; border-radius: 50px; }
    </style>
</head>
<body>

    <div class="dripping-header"></div>

    <div class="admin-wrapper">
        <div id="login-screen" class="login-box">
            <h1 style="color:#2b1406; margin-top:0;">🍫 Admin</h1>
            <input type="password" id="pass" placeholder="Wachtwoord">
            <button class="btn btn-blue" style="width:100%" onclick="checkPass()">INLOGGEN</button>
        </div>

        <div id="admin-content" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; background: #2b1406; padding: 20px; border-radius: 15px; color: white; margin-bottom: 20px; border-bottom: 5px solid #ff9800; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
                <h1 style="margin:0;">🧑‍🍳 Keuken</h1>
                <div>
                    <button class="btn btn-green" onclick="openAddOrder()">➕ NIEUWE</button>
                    <button class="btn btn-purple" onclick="openStock()">📦 VOORRAAD</button>
                </div>
            </div>
            <div id="list">Bestellingen ophalen...</div>
        </div>
    </div>

    <div id="addOrderPopup" class="overlay">
        <div class="popup">
            <h2>➕ Handmatig Toevoegen</h2>
            <input type="text" id="newName" placeholder="Naam Klant">
            <input type="email" id="newEmail" placeholder="E-mail Klant">
            <input type="text" id="newOrderId" placeholder="Order ID (bijv. RS1234)">
            <select id="newBase">
                <option value="Melkchocolade 🍫">Melkchocolade 🍫</option>
                <option value="Pure Chocolade 🍫">Pure Chocolade 🍫</option>
                <option value="Witte Chocolade 🤍">Witte Chocolade 🤍</option>
            </select>
            <input type="text" id="newToppings" placeholder="Toppings (komma gescheiden)">
            <input type="text" id="newPrice" placeholder="Prijs (bijv: €5,89)">
            <button class="btn btn-green" style="width:100%" id="saveBtn">BESTELLING OPSLAAN</button>
            <button class="btn btn-red" style="width:100%" onclick="closeAddOrder()">ANNULEREN</button>
        </div>
    </div>

    <div id="stockPopup" class="overlay">
        <div class="popup">
            <h2>📦 Actuele Voorraad</h2>
            <div class="stock-row header-row"><div>Product</div><div>Aantal Stuks</div></div>
            <div id="stockList" style="max-height: 400px; overflow-y: auto;"></div>
            <button class="btn btn-green" style="width: 100%; margin-top: 20px;" id="saveStockBtn">VOORRAAD OPSLAAN</button>
            <button class="btn btn-red" style="width: 100%;" onclick="closeStock()">ANNULEREN</button>
        </div>
    </div>

    <div id="ingPopup" class="overlay">
        <div class="popup">
            <h2 id="ingTitle">Boodschappenlijst</h2>
            <div id="ingLinks"></div>
            <button class="btn btn-red" style="width:100%" onclick="closeIng()">SLUITEN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhyxUonrBYHfRrkYhxQQcfT45H4vkAMK0",
            authDomain: "rockyshop-e29bb.firebaseapp.com",
            projectId: "rockyshop-e29bb",
            storageBucket: "rockyshop-e29bb.firebasestorage.app",
            messagingSenderId: "429051543496",
            appId: "1:429051543496:web:bfd9c0acc161cd3febcafd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const receptConfig = {
            "Melkchocolade 🍫": 1, "Pure Chocolade 🍫": 1, "Witte Chocolade 🤍": 1,
            "Marshmallows ☁️": 20, "Stroopwafel 🧇": 4, "M&M's 🔴": 30,
            "Oreo 🍪": 3, "Pinda's 🥜": 20, "Choc Chip Melk & Puur 🍫": 4
        };

        const ahLinks = {
            "Melkchocolade 🍫": "https://www.ah.nl/producten/product/wi523483/ah-reep-melk",
            "Pure Chocolade 🍫": "https://www.ah.nl/producten/product/wi523482/ah-reep-puur",
            "Witte Chocolade 🤍": "https://www.ah.nl/producten/product/wi435940/ah-reep-witte-chocolade",
            "Marshmallows ☁️": "https://www.ah.nl/producten/product/wi583917/ah-bakfeest-marshmallows-mini",
            "Stroopwafel 🧇": "https://www.ah.nl/producten/product/wi440742/ah-mini-stroopwafels",
            "M&M's 🔴": "https://www.ah.nl/producten/product/wi572147/m-en-m-s-minis-melk-chocolade",
            "Oreo 🍪": "https://www.ah.nl/producten/product/wi192455/oreo-original",
            "Pinda's 🥜": "https://www.ah.nl/producten/product/wi467588/ah-ongezouten-pinda-s",
            "Choc Chip Melk & Puur 🍫": "https://www.ah.nl/producten/product/wi221017/ah-choc-chip-chocolade-melk-en-puur"
        };

        let orders = [];
        let stock = {};
        const ophaalAdres = "Vul hier je adres in";

        window.checkPass = function() {
            const allowed = ["Isabelle2013!", "Maas2014!", "Livia2015!", "Maud2017!"];
            if(allowed.includes(document.getElementById('pass').value)) {
                document.getElementById('login-screen').style.display='none';
                document.getElementById('admin-content').style.display='block';
                startSync();
            } else { alert("Wachtwoord onjuist!"); }
        };

        function startSync() {
            onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snapshot) => {
                orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderAll();
            });
            onSnapshot(doc(db, "settings", "stock"), (docSnap) => {
                if (docSnap.exists()) { stock = docSnap.data(); renderAll(); }
            });
        }

        function renderAll() {
            const div = document.getElementById('list');
            if (orders.length === 0) {
                div.innerHTML = "<p style='text-align:center; color:white;'>Geen bestellingen gevonden.</p>";
                return;
            }
            div.innerHTML = "";

            orders.forEach((o) => {
                let hasMissing = false;
                const itemsToCheck = [o.base, ...(o.toppings || [])];
                itemsToCheck.forEach(item => {
                    const nodig = receptConfig[item] || 0;
                    const inVoorraad = stock[item] ? stock[item].aantal : 0;
                    if (inVoorraad < nodig) hasMissing = true;
                });

                let statusClass = o.status ? o.status.split(' ')[0] : 'Wacht';
                let btns = "";
                
                if(o.status.includes('Wacht')) btns = `<button class="btn btn-blue" onclick="stuurMail('${o.id}', 'betaal')">📧 BETAALMAIL</button>`;
                else if(o.status === 'Betaalgegevens verstuurd') btns = `<button class="btn btn-green" onclick="setStatus('${o.id}', 'BETAALD')">✅ BETAALD</button>`;
                else if(o.status === 'BETAALD') btns = `<button class="btn btn-blue" onclick="setStatus('${o.id}', 'In-behandeling', 'behandeling')">🧑‍🍳 STARTEN</button>`;
                else if(o.status === 'In-behandeling') btns = `<button class="btn btn-green" onclick="setStatus('${o.id}', 'Klaar', 'klaar')">🔔 MELD KLAAR</button>`;
                else if(o.status === 'Klaar') btns = `<button class="btn btn-dark" onclick="verwijderOrder('${o.id}', true)">🎁 AFGEHAALD</button>`;

                div.innerHTML += `
                    <div class="order-card">
                        <span class="status ${statusClass}">${o.status}</span>
                        <h3>👤 ${o.name} (${o.orderId})</h3>
                        <p><strong>Reep:</strong> ${o.base} met ${o.toppings ? o.toppings.join(', ') : 'niets'}</p>
                        <p><strong>Bedrag:</strong> ${o.price}</p>
                        <div style="display:flex; justify-content: space-between; align-items: flex-end; margin-top: 15px;">
                            <div style="display:flex; gap:5px; flex-wrap:wrap;">
                                <button class="btn btn-info" onclick="showIngredients('${o.id}')">🛒 VOORRAAD ${hasMissing ? '<span class="warning-badge">!</span>' : ''}</button>
                                ${btns}
                            </div>
                            <button class="btn btn-red" style="margin: 0;" onclick="verwijderOrder('${o.id}')">🗑️</button>
                        </div>
                    </div>`;
            });
        }

        window.stuurMail = function(id, type) {
            const o = orders.find(x => x.id === id);
            let sub = "", body = "";
            
            if(type === 'betaal') {
                const tikkieLink = prompt("Plak hier de Tikkie-link voor " + o.name + ":");
                if (!tikkieLink) return; // Stop als er geen link is

                sub = `Betaalgegevens voor bestelling ${o.orderId}`;
                body = `Hoi ${o.name},\n\nBedankt voor je bestelling bij RockyShop!\n\nJe kunt betalen via deze Tikkie:\n${tikkieLink}\n\nZodra de Tikkie is betaald, gaan we voor je aan de slag!\n\nGroetjes,\nRockyShop`;
                setStatus(id, 'Betaalgegevens verstuurd');
            } else if(type === 'behandeling') {
                sub = "We zijn begonnen! 🧑‍🍳";
                body = `Hoi ${o.name}, goed nieuws! De betaling is binnen en we zijn nu bezig met het maken van je Rocky Road reep.`;
            } else if(type === 'klaar') {
                sub = "Je reep is klaar! 🍫";
                body = `Hoi ${o.name}, je bestelling ligt voor je klaar! Je kunt hem ophalen op ons adres.\n\nGroetjes!`;
            } else if(type === 'afgehaald') {
                sub = "Genoten van je Rocky Road?";
                body = `Hoi ${o.name}, bedankt voor je bestelling! We hopen dat de reep lekker was.`;
            }
            
            window.location.href = `mailto:${o.email}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
        };

        window.setStatus = async (id, s, mailType) => {
            await updateDoc(doc(db, "orders", id), { status: s });
            if(mailType) stuurMail(id, mailType);
        };

        window.showIngredients = (id) => {
            const o = orders.find(x => x.id === id);
            const div = document.getElementById('ingLinks');
            div.innerHTML = "";
            const items = [o.base, ...(o.toppings || [])];
            items.forEach(item => {
                const nodig = receptConfig[item] || 0;
                const inVoorraad = stock[item] ? stock[item].aantal : 0;
                if(inVoorraad < nodig) {
                    div.innerHTML += `<a href="${ahLinks[item]}" target="_blank" class="ah-link">🛒 BESTEL ${item} <span>Nodig: ${nodig} (Nu: ${inVoorraad})</span></a>`;
                }
            });
            if(div.innerHTML === "") div.innerHTML = "<h3 style='color:#4caf50;'>✅ Alles op voorraad!</h3>";
            document.getElementById('ingPopup').style.display = 'flex';
        };

        window.verwijderOrder = async (id, metVoorraadAftrek) => {
            const o = orders.find(x => x.id === id);
            if(!o) return;
            const bevestig = metVoorraadAftrek ? "Afgehaald? Voorraad wordt bijgewerkt." : "Verwijderen?";
            if(confirm(bevestig)) {
                if(metVoorraadAftrek) {
                    const newStock = { ...stock };
                    [o.base, ...(o.toppings || [])].forEach(item => {
                        if(newStock[item]) newStock[item].aantal = Math.max(0, (newStock[item].aantal || 0) - receptConfig[item]);
                    });
                    await setDoc(doc(db, "settings", "stock"), newStock);
                    stuurMail(id, 'afgehaald');
                }
                await deleteDoc(doc(db, "orders", id));
            }
        };

        document.getElementById('saveStockBtn').onclick = async () => {
            const newStock = {};
            document.querySelectorAll('.stock-row:not(.header-row)').forEach(row => {
                const item = row.querySelector('label').innerText;
                newStock[item] = { aantal: parseInt(row.querySelector('.stock-aantal').value) || 0 };
            });
            await setDoc(doc(db, "settings", "stock"), newStock);
            closeStock();
        };

        window.openStock = () => {
            const list = document.getElementById('stockList');
            list.innerHTML = "";
            Object.keys(ahLinks).forEach(item => {
                const d = stock[item] || { aantal: 0 };
                list.innerHTML += `<div class="stock-row"><label>${item}</label><input type="number" class="stock-aantal" value="${d.aantal}"></div>`;
            });
            document.getElementById('stockPopup').style.display = 'flex';
        };

        document.getElementById('saveBtn').onclick = async () => {
            const tops = document.getElementById('newToppings').value.split(',').map(t => t.trim()).filter(t => t !== "");
            await addDoc(collection(db, "orders"), {
                name: document.getElementById('newName').value, email: document.getElementById('newEmail').value,
                orderId: document.getElementById('newOrderId').value, base: document.getElementById('newBase').value,
                toppings: tops, price: document.getElementById('newPrice').value,
                status: 'Wacht op betaling', timestamp: serverTimestamp()
            });
            closeAddOrder();
        };

        window.openAddOrder = () => document.getElementById('addOrderPopup').style.display = 'flex';
        window.closeAddOrder = () => document.getElementById('addOrderPopup').style.display = 'none';
        window.closeStock = () => document.getElementById('stockPopup').style.display = 'none';
        window.closeIng = () => document.getElementById('ingPopup').style.display = 'none';
    </script>
</body>
</html>
